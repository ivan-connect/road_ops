<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Torre de Control · Horarios</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #080c12;
    --panel: #0e1420;
    --panel-2: #151c2b;
    --navy: #001d3d;
    --orange: #f15b2b;
    --orange-dim: #b8431e;
    --turquoise: #279bb0;
    --turquoise-dim: #1a6b7a;
    --yellow: #ffb000;
    --green: #9fd1a4;
    --border: rgba(241, 91, 43, 0.16);
    --border-soft: rgba(255, 255, 255, 0.06);
    --grid-line: rgba(255, 255, 255, 0.05);
    --text: #ffffff;
    --text-mid: rgba(255, 255, 255, 0.7);
    --text-dim: rgba(255, 255, 255, 0.42);
    --orange-glow: rgba(241, 91, 43, 0.5);
    --turquoise-glow: rgba(39, 155, 176, 0.35);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Prompt', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(
      0deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px,
      transparent 1px, transparent 3px
    );
    z-index: 1;
  }

  .page {
    max-width: 1240px;
    margin: 0 auto;
    padding: 40px 32px 64px;
    position: relative;
    z-index: 2;
  }

  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }

  .page-label {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-weight: 700;
  }
  .page-label::before {
    content: '';
    display: block;
    width: 24px;
    height: 2px;
    background: var(--orange);
  }

  h1 {
    margin: 0;
    font-size: 34px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: -0.5px;
    line-height: 1.05;
  }

  .header-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
  }

  .updated {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-dim);
    letter-spacing: 0.5px;
  }

  .controls-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  input[type="date"] {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    padding: 8px 12px;
    border-radius: 7px;
    outline: none;
    color-scheme: dark;
  }
  input[type="date"]:focus {
    border-color: var(--orange);
    box-shadow: 0 0 0 3px rgba(241,91,43,0.15);
  }

  button#refresh {
    background: var(--panel-2);
    border: 1px solid var(--border-soft);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    padding: 8px 14px;
    border-radius: 7px;
    cursor: pointer;
    transition: border-color .15s ease, color .15s ease;
  }
  button#refresh:hover { border-color: var(--orange); color: var(--orange); }
  button#refresh:focus-visible { outline: 2px solid var(--orange); outline-offset: 2px; }

  /* View tabs */
  .view-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 22px;
  }
  .view-tab {
    padding: 9px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: var(--panel);
    border: 1px solid var(--border-soft);
    border-radius: 7px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .view-tab:hover { color: var(--text); }
  .view-tab.active {
    color: var(--orange);
    border-color: var(--border);
    background: rgba(241,91,43,0.07);
  }

  /* Team tabs */
  .team-tabs {
    display: flex;
    gap: 2px;
    margin-bottom: 22px;
  }
  .team-tab {
    padding: 7px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    background: transparent;
    border: 1px solid var(--border-soft);
    border-radius: 7px;
    cursor: pointer;
    transition: all .15s ease;
  }
  .team-tab:hover { color: var(--text); }
  .team-tab.active {
    color: var(--turquoise);
    border-color: rgba(39,155,176,0.35);
    background: rgba(39,155,176,0.08);
  }

  .card + .card { margin-top: 20px; }

  /* Coverage table */
  .coverage-scroll { overflow-x: auto; }
  table.coverage-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 900px;
  }
  table.coverage-table th, table.coverage-table td {
    padding: 8px 6px;
    text-align: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border-bottom: 1px solid var(--grid-line);
    white-space: nowrap;
  }
  table.coverage-table th.row-label, table.coverage-table td.row-label {
    text-align: left;
    color: var(--text-mid);
    font-weight: 600;
    text-transform: uppercase;
    font-size: 9.5px;
    letter-spacing: 1px;
  }
  table.coverage-table thead th {
    color: var(--text-dim);
    font-weight: 600;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border-soft);
  }
  td.diff-positive { color: var(--text-dim); }
  td.diff-negative { color: var(--orange); font-weight: 700; }
  td.status-ok::after { content: '✓'; color: var(--turquoise); }
  td.status-bad::after { content: '!'; color: var(--orange); font-weight: 700; }

  .view { display: none; }
  .view.active { display: block; animation: fadeIn .25s ease; }
  @keyframes fadeIn { from { opacity:0; transform: translateY(6px);} to {opacity:1; transform:none;} }

  .card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--orange);
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--orange);
    box-shadow: 0 0 8px var(--orange-glow);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.35;} }

  .card-desc {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    color: var(--text-dim);
    margin-bottom: 18px;
    text-transform: capitalize;
  }

  .state-msg {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-dim);
    padding: 40px 0;
  }
  .state-msg.error { color: var(--orange); line-height: 1.7; }

  /* ---- Day (gantt) view ---- */
  .gantt-scroll { overflow-x: auto; }
  .gantt-wrap { min-width: 900px; position: relative; }

  .gantt-header {
    display: grid;
    grid-template-columns: 210px repeat(24, 1fr);
    position: sticky;
    top: 0;
    background: var(--panel);
    z-index: 3;
    padding-bottom: 8px;
  }
  .gantt-header .corner {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    color: var(--text-dim);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    align-self: end;
  }
  .gantt-header .hour-label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--text-dim);
    text-align: center;
  }

  .gantt-body { position: relative; }

  .agent-row {
    display: grid;
    grid-template-columns: 210px repeat(24, 1fr);
    align-items: center;
    height: 32px;
    border-bottom: 1px solid var(--grid-line);
  }
  .agent-row:hover { background: rgba(255,255,255,0.015); }

  .agent-name {
    font-size: 12.5px;
    color: var(--text-mid);
    padding-right: 14px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    position: sticky;
    left: 0;
    background: inherit;
  }

  .track {
    grid-column: 2 / span 24;
    display: grid;
    grid-template-columns: repeat(24, 1fr);
    height: 100%;
    position: relative;
  }
  .track .cell { border-left: 1px solid var(--grid-line); height: 100%; }
  .track .cell.weekend { background: rgba(241,91,43,0.04); }

  .bar {
    height: 18px;
    align-self: center;
    background: linear-gradient(180deg, var(--turquoise) 0%, var(--turquoise-dim) 100%);
    border-radius: 4px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35), 0 2px 6px var(--turquoise-glow);
    margin: 0 1px;
  }

  .now-line {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: var(--orange);
    box-shadow: 0 0 10px var(--orange-glow), 0 0 22px var(--orange-glow);
    z-index: 2;
    pointer-events: none;
  }
  .now-line::before {
    content: attr(data-time);
    position: absolute;
    top: -22px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 600;
    color: var(--orange);
    white-space: nowrap;
    background: var(--panel);
    padding: 2px 6px;
    border-radius: 3px;
  }

  .empty-note {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
    padding: 20px 0;
  }

  /* ---- Week view ---- */
  .week-scroll { overflow-x: auto; }
  table.week-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 920px;
  }
  table.week-table th, table.week-table td {
    padding: 10px 12px;
    text-align: center;
    font-size: 11.5px;
    border-bottom: 1px solid var(--grid-line);
    white-space: nowrap;
  }
  table.week-table thead th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
  }
  table.week-table thead th.today-col { color: var(--orange); }
  table.week-table td.agent-cell {
    text-align: left;
    color: var(--text-mid);
    font-weight: 500;
  }
  table.week-table td.shift-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--turquoise);
  }
  table.week-table td.shift-cell.off {
    color: var(--text-dim);
  }
  table.week-table td.hours-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--yellow);
    font-weight: 600;
  }
  table.week-table tbody tr:hover { background: rgba(255,255,255,0.015); }

  /* Forecast table */
  .forecast-scroll { overflow-x: auto; }
  table.forecast-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 640px;
  }
  table.forecast-table th, table.forecast-table td {
    padding: 12px 10px;
    text-align: center;
    font-size: 12px;
    border-bottom: 1px solid var(--grid-line);
  }
  table.forecast-table thead th {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--text-dim);
    font-weight: 600;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--border-soft);
  }
  table.forecast-table thead th.today-col { color: var(--orange); }
  table.forecast-table td.day-cell {
    text-align: left;
    color: var(--text-mid);
    font-weight: 600;
    text-transform: capitalize;
  }
  table.forecast-table td.load-cell {
    font-family: 'JetBrains Mono', monospace;
    color: var(--turquoise);
    font-weight: 600;
    font-size: 14px;
  }
  table.forecast-table tfoot td {
    font-family: 'JetBrains Mono', monospace;
    color: var(--yellow);
    font-weight: 700;
    border-bottom: none;
    border-top: 1px solid var(--border-soft);
    padding-top: 14px;
  }
  table.forecast-table tbody tr:hover { background: rgba(255,255,255,0.015); }

  ::-webkit-scrollbar { height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border-soft); border-radius: 4px; }

  @media (prefers-reduced-motion: reduce) {
    .card-title .dot { animation: none; }
  }

  @media (max-width: 640px) {
    h1 { font-size: 26px; }
    .page { padding: 28px 16px 48px; }
  }
</style>
</head>
<body>

<div class="page">

  <header>
    <div>
      <div class="page-label">torre de control</div>
      <h1>Horarios</h1>
    </div>
    <div class="header-right">
      <span class="updated" id="updated-label"></span>
      <div class="controls-row">
        <input type="date" id="date-picker" aria-label="Seleccionar fecha">
        <button id="refresh" aria-label="Actualizar datos">↻ actualizar</button>
      </div>
    </div>
  </header>

  <div class="view-tabs">
    <button class="view-tab active" data-view="day">Vista diaria</button>
    <button class="view-tab" data-view="week">Vista semanal</button>
    <button class="view-tab" data-view="forecast">Forecast</button>
  </div>

  <div class="team-tabs" id="team-tabs">
    <button class="team-tab active" data-team="TC">Torre de Control</button>
    <button class="team-tab" data-team="Back">Back</button>
  </div>

  <!-- DAY VIEW -->
  <div class="view active" id="view-day">
    <div class="card">
      <div class="card-title"><span class="dot"></span>parrilla horaria</div>
      <div class="card-desc" id="day-label"></div>
      <div class="gantt-scroll">
        <div id="day-content"><div class="state-msg">Cargando datos…</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span class="dot"></span>cobertura por hora</div>
      <div class="card-desc">Requeridos vs. programados, equipo seleccionado</div>
      <div class="coverage-scroll">
        <div id="coverage-content"><div class="state-msg">Cargando datos…</div></div>
      </div>
    </div>
  </div>

  <!-- WEEK VIEW -->
  <div class="view" id="view-week">
    <div class="card">
      <div class="card-title"><span class="dot"></span>programación semanal</div>
      <div class="card-desc">Rango de turno por agente, lunes a domingo</div>
      <div class="week-scroll">
        <div id="week-content"><div class="state-msg">Cargando datos…</div></div>
      </div>
    </div>
  </div>
  <!-- FORECAST VIEW -->
  <div class="view" id="view-forecast">
    <div class="card">
      <div class="card-title"><span class="dot"></span>forecast</div>
      <div class="card-desc">Servicios esperados por día, equipo seleccionado</div>
      <div class="forecast-scroll">
        <div id="forecast-content"><div class="state-msg">Cargando datos…</div></div>
      </div>
    </div>
  </div>

</div>

<script>
  const WEBHOOK_URL = "https://iagb.app.n8n.cloud/webhook/b81f597c-d181-4545-9a2a-a08cb3188e61";
  const DAY_NAMES = ["domingo","lunes","martes","miércoles","jueves","viernes","sábado"];
  const WEEK_ORDER = [1,2,3,4,5,6,0]; // lunes..domingo
  const WEEK_SHORT = { 1:"Lun", 2:"Mar", 3:"Mié", 4:"Jue", 5:"Vie", 6:"Sáb", 0:"Dom" };

  let rawData = null;
  let nowLineInterval = null;
  let currentTeam = 'TC';
  let hasTeamData = false;

  const datePicker = document.getElementById('date-picker');
  const dayContent = document.getElementById('day-content');
  const weekContent = document.getElementById('week-content');
  const coverageContent = document.getElementById('coverage-content');
  const forecastContent = document.getElementById('forecast-content');
  const dayLabel = document.getElementById('day-label');
  const updatedLabel = document.getElementById('updated-label');
  const refreshBtn = document.getElementById('refresh');
  const teamTabsEl = document.getElementById('team-tabs');

  function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  datePicker.value = todayStr();

  // ---- View switching ----
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('view-' + tab.dataset.view).classList.add('active');
    });
  });

  // ---- Team switching ----
  teamTabsEl.querySelectorAll('.team-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      teamTabsEl.querySelectorAll('.team-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentTeam = tab.dataset.team;
      renderDay();
      renderWeek();
      renderCoverage();
      renderForecast();
    });
  });

  async function loadData() {
    dayContent.innerHTML = '<div class="state-msg">Cargando datos…</div>';
    weekContent.innerHTML = '<div class="state-msg">Cargando datos…</div>';
    try {
      const res = await fetch(WEBHOOK_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      rawData = await res.json();
      updatedLabel.textContent = rawData.updatedAt
        ? `actualizado: ${new Date(rawData.updatedAt).toLocaleString('es-CO')}`
        : '';
      hasTeamData = (rawData.cells || []).some(c => c.team);
      teamTabsEl.style.display = hasTeamData ? 'flex' : 'none';
      renderDay();
      renderWeek();
      renderCoverage();
      renderForecast();
    } catch (err) {
      const isCors = err instanceof TypeError;
      const msg = `
        <div class="state-msg error">
          No se pudo cargar el horario.<br>
          ${isCors
            ? 'Esto suele pasar por CORS: el webhook de n8n no está devolviendo el header Access-Control-Allow-Origin. Revisa la configuración del nodo Webhook.'
            : 'Error: ' + err.message}
        </div>`;
      dayContent.innerHTML = msg;
      weekContent.innerHTML = msg;
    }
  }

  function buildRanges(hours) {
    const sorted = [...hours].sort((a,b) => a-b);
    const ranges = [];
    let start = sorted[0], prev = sorted[0];
    for (let i=1; i<sorted.length; i++) {
      if (sorted[i] === prev+1) { prev = sorted[i]; }
      else { ranges.push([start, prev]); start = sorted[i]; prev = sorted[i]; }
    }
    ranges.push([start, prev]);
    return ranges;
  }

  function renderDay() {
    if (!rawData) return;
    const dateVal = datePicker.value;
    const selectedDate = new Date(dateVal + 'T00:00:00');
    const dayOfWeek = selectedDate.getDay();
    const isToday = dateVal === todayStr();
    const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;

    dayLabel.textContent = `${DAY_NAMES[dayOfWeek]} · ${selectedDate.toLocaleDateString('es-CO',{day:'numeric',month:'long',year:'numeric'})}`;

    const cellsForDay = (rawData.cells || []).filter(c =>
      c.day === dayOfWeek && c.scheduled && (!hasTeamData || c.team === currentTeam)
    );
    const byAgent = {};
    for (const c of cellsForDay) {
      if (!byAgent[c.agent]) byAgent[c.agent] = [];
      byAgent[c.agent].push(c.hour);
    }
    const agentNames = Object.keys(byAgent).sort((a,b) => {
      const minA = Math.min(...byAgent[a]), minB = Math.min(...byAgent[b]);
      return minA !== minB ? minA-minB : a.localeCompare(b);
    });

    if (nowLineInterval) clearInterval(nowLineInterval);

    if (agentNames.length === 0) {
      const totalCells = (rawData.cells || []).length;
      const distinctDays = [...new Set((rawData.cells || []).map(c => c.day))].sort();
      const distinctDayTypes = [...new Set((rawData.cells || []).map(c => typeof c.day))];
      const scheduledTrueCount = (rawData.cells || []).filter(c => c.scheduled).length;
      dayContent.innerHTML = `
        <div class="empty-note">
          Sin agentes programados este día.<br><br>
          <strong>Diagnóstico:</strong><br>
          Total de celdas en el JSON: ${totalCells}<br>
          Celdas con scheduled=true: ${scheduledTrueCount}<br>
          Valores distintos de "day" encontrados: [${distinctDays.join(', ')}]<br>
          Tipo(s) de dato de "day": ${distinctDayTypes.join(', ')}<br>
          Buscando day === ${dayOfWeek} (tipo: ${typeof dayOfWeek})
        </div>`;
      return;
    }

    let html = `
      <div class="gantt-wrap">
        <div class="gantt-header">
          <div class="corner">agente</div>
          ${Array.from({length:24},(_,h)=>`<div class="hour-label">${String(h).padStart(2,'0')}</div>`).join('')}
        </div>
        <div class="gantt-body" id="gantt-body">`;
    for (const agent of agentNames) {
      const ranges = buildRanges(byAgent[agent]);
      html += `<div class="agent-row">
        <div class="agent-name" title="${agent}">${agent}</div>
        <div class="track">
          ${Array.from({length:24},(_,h)=>`<div class="cell${isWeekend?' weekend':''}"></div>`).join('')}
          ${ranges.map(([s,e]) => `<div class="bar" style="grid-column: ${s+1} / ${e+2};"></div>`).join('')}
        </div>
      </div>`;
    }
    html += `</div></div>`;
    dayContent.innerHTML = html;

    if (isToday) {
      const ganttBody = document.getElementById('gantt-body');
      const line = document.createElement('div');
      line.className = 'now-line';
      ganttBody.style.position = 'relative';
      ganttBody.appendChild(line);
      const updateNowLine = () => {
        const now = new Date();
        const frac = (now.getHours() + now.getMinutes()/60) / 24;
        line.style.left = `calc(210px + ${frac} * (100% - 210px))`;
        line.setAttribute('data-time', now.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}));
      };
      updateNowLine();
      nowLineInterval = setInterval(updateNowLine, 30000);
    }
  }

  function renderWeek() {
    if (!rawData) return;
    const todayDow = new Date().getDay();

    // Group all scheduled cells by agent, then by day
    const byAgent = {};
    for (const c of (rawData.cells || [])) {
      if (!c.scheduled) continue;
      if (hasTeamData && c.team !== currentTeam) continue;
      if (!byAgent[c.agent]) byAgent[c.agent] = {};
      if (!byAgent[c.agent][c.day]) byAgent[c.agent][c.day] = [];
      byAgent[c.agent][c.day].push(c.hour);
    }

    const agentNames = Object.keys(byAgent).sort((a,b) => a.localeCompare(b));

    if (agentNames.length === 0) {
      weekContent.innerHTML = '<div class="empty-note">Sin datos de agentes.</div>';
      return;
    }

    let html = `<table class="week-table"><thead><tr>
      <th style="text-align:left;">Agente</th>
      ${WEEK_ORDER.map(d => `<th class="${d===todayDow ? 'today-col' : ''}">${WEEK_SHORT[d]}</th>`).join('')}
      <th>Horas</th>
    </tr></thead><tbody>`;

    for (const agent of agentNames) {
      let totalHours = 0;
      let rowCells = '';
      for (const d of WEEK_ORDER) {
        const hours = byAgent[agent][d];
        if (!hours || hours.length === 0) {
          rowCells += `<td class="shift-cell off">D</td>`;
        } else {
          const min = Math.min(...hours);
          const max = Math.max(...hours);
          totalHours += hours.length;
          rowCells += `<td class="shift-cell">${String(min).padStart(2,'0')}:00–${String(max+1).padStart(2,'0')}:00</td>`;
        }
      }
      html += `<tr><td class="agent-cell">${agent}</td>${rowCells}<td class="hours-cell">${totalHours}h</td></tr>`;
    }
    html += `</tbody></table>`;
    weekContent.innerHTML = html;
  }

  function renderCoverage() {
    if (!rawData) return;
    if (!hasTeamData || !rawData.expectedLoad) {
      coverageContent.innerHTML = '<div class="empty-note">Datos de cobertura no disponibles aún.</div>';
      return;
    }
    const dateVal = datePicker.value;
    const dayOfWeek = new Date(dateVal + 'T00:00:00').getDay();

    const loadArr = rawData.expectedLoad[currentTeam] || [];
    const requiredByHour = {};
    for (const item of loadArr) {
      if (item.day === dayOfWeek) requiredByHour[item.hour] = item.requiredAgents;
    }

    const cellsForDay = (rawData.cells || []).filter(c =>
      c.day === dayOfWeek && c.scheduled && c.team === currentTeam
    );
    const programadosByHour = {};
    for (let h = 0; h < 24; h++) {
      const agentsAtHour = new Set(cellsForDay.filter(c => c.hour === h).map(c => c.agent));
      programadosByHour[h] = agentsAtHour.size;
    }

    let requeridosRow = '', programadosRow = '', diffRow = '', statusRow = '';
    for (let h = 0; h < 24; h++) {
      const req = requiredByHour[h] ?? 0;
      const prog = programadosByHour[h] ?? 0;
      const diff = prog - req;
      requeridosRow += `<td>${req}</td>`;
      programadosRow += `<td>${prog}</td>`;
      diffRow += `<td class="${diff < 0 ? 'diff-negative' : 'diff-positive'}">${diff > 0 ? '+' : ''}${diff}</td>`;
      statusRow += `<td class="${diff < 0 ? 'status-bad' : 'status-ok'}"></td>`;
    }

    coverageContent.innerHTML = `
      <table class="coverage-table">
        <thead><tr>
          <th class="row-label">Hora</th>
          ${Array.from({length:24},(_,h)=>`<th>${String(h).padStart(2,'0')}:00</th>`).join('')}
        </tr></thead>
        <tbody>
          <tr><td class="row-label">Requeridos</td>${requeridosRow}</tr>
          <tr><td class="row-label">Programados</td>${programadosRow}</tr>
          <tr><td class="row-label">Diferencia</td>${diffRow}</tr>
          <tr><td class="row-label">Estado</td>${statusRow}</tr>
        </tbody>
      </table>`;
  }

  function renderForecast() {
    if (!rawData) return;
    if (!rawData.expectedLoad) {
      forecastContent.innerHTML = '<div class="empty-note">Datos de forecast no disponibles aún.</div>';
      return;
    }
    const todayDow = new Date().getDay();
    const loadArr = rawData.expectedLoad[currentTeam] || [];

    const totalsByDay = {};
    for (const d of WEEK_ORDER) totalsByDay[d] = 0;
    for (const item of loadArr) {
      if (totalsByDay[item.day] !== undefined) totalsByDay[item.day] += item.load;
    }

    const grandTotal = WEEK_ORDER.reduce((sum, d) => sum + totalsByDay[d], 0);

    let rows = '';
    for (const d of WEEK_ORDER) {
      rows += `<tr>
        <td class="day-cell">${DAY_NAMES[d]}${d === todayDow ? ' · hoy' : ''}</td>
        <td class="load-cell">${Math.round(totalsByDay[d])}</td>
      </tr>`;
    }

    forecastContent.innerHTML = `
      <table class="forecast-table">
        <thead><tr>
          <th style="text-align:left;">Día</th>
          <th>Servicios esperados</th>
        </tr></thead>
        <tbody>${rows}</tbody>
        <tfoot><tr>
          <td style="text-align:left;">Total semana</td>
          <td>${Math.round(grandTotal)}</td>
        </tr></tfoot>
      </table>`;
  }

  datePicker.addEventListener('change', () => { renderDay(); renderCoverage(); });
  refreshBtn.addEventListener('click', loadData);

  loadData();
</script>

</body>
</html>
